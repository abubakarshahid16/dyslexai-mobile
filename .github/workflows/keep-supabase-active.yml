name: Keep Supabase Active

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping-backend-db:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          HEALTH_URL: ${{ secrets.EXERCISE_DB_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "Missing EXERCISE_DB_HEALTH_URL secret"
            exit 1
          fi
          curl --fail --show-error --silent "$HEALTH_URL"
